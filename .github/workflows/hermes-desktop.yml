name: Hermes Agent Desktop - Cloudflare
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hermes-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - name: System Info
      run: |
        echo "========================================"
        echo "  HERMES AGENT DESKTOP v4.0"
        echo "  Official Web Dashboard + Cloudflare Tunnel"
        echo "========================================"
        echo "Runner: $(uname -a)"
        echo "Time: $(date)"
        echo ""
        echo "STEP 1: Info OK"

    - name: Install Hermes Agent
      run: |
        echo "STEP 2: Installing Hermes Agent..."
        curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
        echo "$HOME/.hermes/bin" >> $GITHUB_PATH
        echo "STEP 2: OK"

    - name: Verify Hermes Installation
      run: |
        export PATH="$HOME/.hermes/bin:$PATH"
        echo "Hermes version:"
        hermes --version || true
        echo "Which hermes:"
        which hermes || true
        echo "STEP 3: OK"

    - name: Start Hermes Dashboard
      run: |
        export PATH="$HOME/.hermes/bin:$PATH"
        echo "STEP 4: Starting Hermes Dashboard on port 9119..."
        echo "This starts the official Hermes Web Dashboard at http://127.0.0.1:9119"
        echo ""
        
        # Start the dashboard server
        nohup hermes dashboard --port 9119 --host 0.0.0.0 --insecure > /tmp/dashboard.log 2>&1 &
        echo "Dashboard PID: $!"
        
        echo "Waiting 15 sec for dashboard to start..."
        for i in $(seq 1 15); do
          sleep 1
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:9119 | grep -q -E "200|302"; then
            echo "Dashboard is UP! (attempt $i)"
            echo "STEP 4: OK"
            break
          fi
          echo "Still starting... ($i/15)"
        done
        
        # Show dashboard log so far
        echo ""
        echo "Dashboard log:"
        head -50 /tmp/dashboard.log || true

    - name: Install Cloudflare Tunnel
      run: |
        echo "STEP 5: Installing Cloudflared..."
        curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
        chmod +x /tmp/cloudflared
        echo "STEP 5: OK"

    - name: Start Cloudflare Tunnel
      run: |
        echo "STEP 6: Starting Cloudflare tunnel to port 9119..."
        nohup /tmp/cloudflared tunnel --url http://localhost:9119 > /tmp/tunnel.log 2>&1 &
        echo "Tunnel PID: $!"
        
        echo "Waiting 20 sec for tunnel to establish..."
        TUNNEL_URL=""
        for i in $(seq 1 20); do
          sleep 1
          TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9-]+\.trycloudflare\.com" /tmp/tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL UP: $TUNNEL_URL"
            break
          fi
          echo "Waiting... ($i/20)"
        done
        
        # Show tunnel log
        echo ""
        echo "=== Tunnel log ==="
        tail -30 /tmp/tunnel.log || true
        echo ""
        
        if [ -n "$TUNNEL_URL" ]; then
          echo ""
          echo "============================================"
          echo "  HERMES DASHBOARD IS LIVE"
          echo "============================================"
          echo ""
          echo "  PUBLIC URL: $TUNNEL_URL"
          echo ""
          echo "  Open this URL in your browser to access"
          echo "  the Hermes Agent Dashboard."
          echo ""
          echo "  NOTE: You need to configure your AI model"
          echo "  and API keys in the dashboard settings."
          echo ""
          echo "  Dashboard runs for 6 hours max."
          echo ""
          echo "============================================"
          echo "$TUNNEL_URL" > /tmp/tunnel_url.txt
        else
          echo ""
          echo "WARNING: Tunnel URL not found in logs!"
          echo "Check logs: /tmp/tunnel.log"
          echo "STEP 6: WARNING - check logs"
        fi

    - name: Verify Dashboard Accessible
      run: |
        echo "STEP 7: Verifying dashboard..."
        for i in $(seq 1 10); do
          RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9119)
          if [ "$RESP" = "200" ] || [ "$RESP" = "302" ] || [ "$RESP" = "401" ]; then
            echo "Dashboard responded with HTTP $RESP - OK"
            break
          fi
          echo "Retry $i/10... HTTP $RESP"
          sleep 2
        done
        echo "STEP 7: OK"

    - name: Keep Alive with Logs
      run: |
        echo "STEP 8: Keeping session alive for 6 hours..."
        echo "Press Ctrl+C to stop early."
        for i in $(seq 360 -1 1); do
          if [ $((i % 10)) -eq 0 ]; then
            echo "==== Status at $i minutes remaining ===="
            echo "Dashboard:" && curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:9119 || true
            if [ -f /tmp/tunnel_url.txt ]; then
              echo " | Tunnel: $(cat /tmp/tunnel_url.txt)"
            else
              echo ""
            fi
          else
            echo "Remaining: $i min"
          fi
          sleep 60
        done
