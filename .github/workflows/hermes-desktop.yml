name: Hermes Agent Web Dashboard
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hermes-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - name: System Info
      run: |
        echo "========================================"
        echo "  HERMES AGENT WEB DASHBOARD v3.0"
        echo "========================================"
        echo "Runner: $(uname -a)"

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl wget git python3 python3-pip ffmpeg

    - name: Install Cloudflared
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Install Hermes Agent
      run: |
        curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
        echo "[OK] Hermes installed"

    - name: Install Hermes Gateway
      run: |
        export PATH="$HOME/.hermes/bin:$PATH"
        hermes gateway install
        echo "[OK] Gateway installed"

    - name: Start Web
      run: |
        mkdir -p /tmp/www
        echo '<!DOCTYPE html><html><head><title>Hermes</title><style>body{background:#050505;color:#00ff88;font-family:monospace;padding:40px;max-width:900px;margin:auto}h1{border-bottom:2px dashed #00ff88;padding-bottom:10px}.status{border:1px solid #00ff88;padding:15px;margin:20px 0;background:#001100}pre{background:#001100;padding:15px;border:1px solid #003300;font-size:13px}.green{color:#0f0}.yellow{color:#ff0}.blue{color:#0ff}</style></head><body><h1> Hermes Agent Dashboard</h1><div class="status"><strong>Status:</strong> <span class="green">● Running</span></div><p><strong>Platform:</strong> Nous Research Hermes Agent</p><h3>Quick Commands</h3><pre><span class="blue">hermes</span>              Start chat<span class="blue">hermes setup</span>        Configure<span class="blue">hermes config</span>       View config</pre><p class="yellow">Note: GitHub Actions runner - active for 6 hours</p></body></html>' > /tmp/www/index.html
        python3 -m http.server 9119 --directory /tmp/www &
        sleep 3
        echo "[OK] Web server running on http://localhost:9119"

    - name: Cloudflare Tunnel
      run: |
        cloudflared tunnel --url http://localhost:9119 2>&1 | tee tunnel.log &
        sleep 15
        TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9-]+\.trycloudflare\.com" tunnel.log | head -1)
        if [ -n "$TUNNEL_URL" ]; then
          echo ""
          echo "============================================"
          echo "  HERMES AGENT IS ONLINE"
          echo "============================================"
          echo "  URL: $TUNNEL_URL"
          echo "============================================"
          echo "$TUNNEL_URL" > /tmp/tunnel_url.txt
        else
          cat tunnel.log | tail -20
        fi

    - name: Keep Alive
      run: |
        for i in $(seq 360 -1 1); do
          echo "Remaining: $i min"
          sleep 60
        done
