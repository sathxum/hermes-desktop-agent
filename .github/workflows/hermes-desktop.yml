name: Hermes Agent Desktop
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - name: System Info
      run: echo "Starting Hermes Agent deployment"
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl wget git python3 nodejs npm ffmpeg
    
    - name: Install Cloudflared
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/
    
    - name: Install Hermes Agent
      run: curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
    
    - name: Start Status Server
      run: |
        mkdir -p /tmp/www
        echo "<html><body><h1>Hermes Agent Running</h1></body></html>" > /tmp/www/index.html
        cd /tmp/www && python3 -m http.server 8080 &
    
    - name: Start Cloudflare Tunnel
      run: |
        cloudflared tunnel --url http://localhost:8080 2>&1 | tee /tmp/tunnel.log &
        sleep 10
        grep -o "https://[^ ]*trycloudflare.com" /tmp/tunnel.log || echo "Check logs for URL"
    
    - name: Keep Alive
      run: |
        for i in $(seq 360 -1 1); do
          echo "Remaining: $i min"
          sleep 60
        done
