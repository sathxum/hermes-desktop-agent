name: Hermes Agent Web Dashboard
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hermes-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - name: System Info
      run: |
        echo "========================================"
        echo "  HERMES AGENT WEB DASHBOARD"
        echo "  With Cloudflare Tunnel v2.0"
        echo "========================================"
        echo "Runner: $(uname -a)"
        echo "Time: $(date)"

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl wget git python3 python3-pip python3-venv ffmpeg
        # Install Python packages that Hermes needs
        pip install python-dotenv requests flask --break-system-packages

    - name: Install Cloudflared
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Install Hermes Agent
      run: |
        echo "Installing Hermes Agent..."
        curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
        echo "Hermes installation completed"

    - name: Configure Hermes with API Keys
      run: |
        mkdir -p ~/.hermes
        cat > ~/.hermes/.env << 'ENVFILE'
        # Hermes Configuration
        HERMES_MODEL=openrouter:anthropic/claude-3.5-sonnet
        HERMES_API_KEY=${{ secrets.HERMES_API_KEY }}
        HERMES_GATEWAY_PORT=9119
        ENVFILE
        echo "[INFO] Hermes config created"

    - name: Start Hermes Dashboard
      run: |
        cd ~/.hermes/hermes-agent
        
        # Source the virtual environment
        source .venv/bin/activate
        
        # Install missing dependencies
        pip install python-dotenv requests flask
        
        # Start Hermes Gateway with dashboard
        nohup ./hermes gateway run --port 9119 > dashboard.log 2>&1 &
        echo $! > hermes.pid
        
        sleep 10
        
        if curl -s http://localhost:9119 > /dev/null 2>&1; then
          echo "[SUCCESS] Hermes Dashboard is running!"
          echo "Local URL: http://localhost:9119"
        else
          echo "[ERROR] Dashboard failed to start"
          cat dashboard.log
          exit 1
        fi

    - name: Start Cloudflare Tunnel
      run: |
        echo "[INFO] Starting Cloudflare Tunnel..."
        cloudflared tunnel --url http://localhost:9119 2>&1 | tee tunnel.log &
        sleep 15
        
        # Extract the tunnel URL
        TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9-]+\.trycloudflare\.com" tunnel.log | head -1)
        
        if [ -n "$TUNNEL_URL" ]; then
          echo ""
          echo "============================================"
          echo "  🎉 HERMES AGENT IS ONLINE!"
          echo "============================================"
          echo ""
          echo "  Public URL: $TUNNEL_URL"
          echo ""
          echo "  Username: admin"
          echo "  Password: Hermes@2024!"
          echo ""
          echo "  (Save this URL - it will expire in 6 hours)"
          echo "============================================"
          echo ""
          echo "$TUNNEL_URL" > /tmp/tunnel_url.txt
        else
          echo "[WARNING] Could not get tunnel URL, check logs"
          cat tunnel.log
        fi

    - name: Display Connection Info
      run: |
        echo ""
        echo "╔══════════════════════════════════════════╗"
        echo "║     HERMES AGENT CONNECTION INFO         ║"
        echo "╚══════════════════════════════════════════╝"
        echo ""
        if [ -f /tmp/tunnel_url.txt ]; then
          echo "Public URL: $(cat /tmp/tunnel_url.txt)"
        else
          echo "Check GitHub Action logs for tunnel URL"
        fi
        echo ""
        echo "Hermes will stay active for 6 hours max."

    - name: Keep Alive (6 hours)
      run: |
        for i in $(seq 360 -1 1); do
          echo "⏱ Time remaining: $i minutes"
          sleep 60
        done
